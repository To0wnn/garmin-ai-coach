services:
  garmin-ai-coach:
    build: .
    image: garmin-ai-coach:latest
    container_name: garmin-ai-coach
    restart: unless-stopped
    network_mode: bridge
    environment:
      - INFLUXDB_URL=${INFLUXDB_URL}
      - INFLUXDB_DB=${INFLUXDB_DB:-GarminStats}
      - WATCH_DEVICE=${WATCH_DEVICE:-fenix 8 - 47mm, AMOLED}
      - LOCAL_TZ=${LOCAL_TZ:-Europe/Amsterdam}
      - LANGUAGE=${LANGUAGE:-English}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
      - DASHBOARD_PORT=${DASHBOARD_PORT:-8420}
    ports:
      - "4874:8420"
    volumes:
      - ./coach-home:/home/coach
